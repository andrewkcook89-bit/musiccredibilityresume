<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Music Tracker</title>
<style>
:root{--bg:#0e0e0e;--bg2:#161616;--bg3:#1e1e1e;--red:#c0392b;--red2:#e74c3c;--red3:#922b21;--text:#e8e8e8;--text2:#9a9a9a;--text3:#5a5a5a;--border:#2a2a2a;--border2:#333}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{padding:.75rem 1rem;max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);background:var(--bg2);margin:0 -1rem;padding:0 1rem;margin-bottom:0}
.tab{padding:9px 13px;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;background:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--text2)}.tab.active{color:var(--red2);border-bottom-color:var(--red)}
.section{display:none;padding:1rem 0}.section.active{display:block}
.ctrl{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.ctrl input,.ctrl select{font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:0;background:var(--bg2);color:var(--text);outline:none;height:30px}
.ctrl input:focus,.ctrl select:focus{border-color:var(--red)}
.ctrl input.flex1{flex:1;min-width:110px}.ctrl select option{background:var(--bg2)}
.btn{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:0 12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;border-radius:0;transition:all .15s;height:30px;white-space:nowrap;display:inline-flex;align-items:center}
.btn:hover{border-color:var(--red);color:var(--red2)}
.btn-p{background:var(--red);color:#fff;border-color:var(--red)}.btn-p:hover{background:var(--red2);border-color:var(--red2)}
.btn-sm{font-size:11px;padding:0 9px;height:24px}
.btn-clr{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:0 10px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;border-radius:0;height:30px;display:inline-flex;align-items:center}
.btn-clr:hover{border-color:var(--red2);color:var(--red2)}
.btn-icon{font-size:13px;padding:0 8px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text3);border-radius:0;transition:all .15s;height:24px;display:inline-flex;align-items:center}
.btn-icon:hover{border-color:var(--red);color:var(--red2)}.btn-icon:disabled{opacity:.2;cursor:default}
/* Table */
.run-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.run-tbl th{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border2);cursor:pointer;white-space:nowrap;background:var(--bg2);position:sticky;top:0;z-index:1}
.run-tbl th:hover{color:var(--text2)}.run-tbl th.sorted{color:var(--red2)}
.run-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;overflow:hidden;text-overflow:ellipsis}
.run-tbl tr:hover td{background:var(--bg2)}
.badge{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;white-space:nowrap;display:inline-block}
.b-yes{background:#1a2e1a;color:#4caf50;border:1px solid #2a4a2a}.b-no{background:#2e1a1a;color:#e74c3c;border:1px solid #4a2a2a}
.b-genre{background:#1e1a2e;color:#9b8fe8;border:1px solid #2e2a4a}.b-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.yr-hdr{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin:1rem 0 4px;border-left:2px solid var(--red3);padding-left:8px}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px;letter-spacing:.06em}
.rk-dot{display:inline-block;width:4px;height:4px;background:var(--red);margin-left:4px;vertical-align:middle;border-radius:50%}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;overflow-y:auto;padding:2rem 1rem}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-top:2px solid var(--red);padding:1.5rem;width:min(640px,100%);margin:auto;position:relative}
.modal-box h3{font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--red2);margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.fr{margin-bottom:9px}.fr label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:2px}
.fr input,.fr textarea,.fr select{width:100%;font-size:13px;padding:7px 9px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;border-radius:0}
.fr input:focus,.fr textarea:focus,.fr select:focus{border-color:var(--red)}
.fr textarea{resize:vertical;min-height:52px}.fr select option{background:var(--bg2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:1rem;padding-top:.875rem;border-top:1px solid var(--border)}
.slbl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--red3);margin:12px 0 5px;padding-top:10px;border-top:1px solid var(--border)}
.lbox{background:var(--bg3);border:1px solid var(--border);padding:.75rem;margin-bottom:8px}
.lrow{display:flex;gap:6px;margin-bottom:6px}.lrow input{flex:1;font-size:13px;padding:6px 9px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;border-radius:0}
.rscr{max-height:180px;overflow-y:auto;border:1px solid var(--border);background:var(--bg2);padding:3px}
.rrow{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;cursor:pointer;border-bottom:1px solid var(--border)}.rrow:last-child{border-bottom:none}
.rrow:hover{background:var(--bg3)}.rrow.sel{background:var(--bg3);border-left:2px solid var(--red)}
.rrow input[type=checkbox]{margin-top:1px;flex-shrink:0;accent-color:var(--red)}
.rri{flex:1}.rrt{font-size:13px;font-weight:500}.rrm{font-size:11px;color:var(--text3)}
.rsub{margin-top:4px;display:flex;flex-direction:column;gap:3px}
.rsub input{font-size:10px;padding:3px 6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;border-radius:0;width:100%}
.tag{font-size:10px;padding:1px 5px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.hint{font-size:11px;color:var(--text3);padding:4px 0;font-style:italic}
.rkp-row{display:flex;align-items:center;gap:8px;padding:6px 9px;border-bottom:1px solid var(--border);cursor:pointer}
.rkp-row:hover{background:var(--bg3)}.rkp-row.sel{background:var(--bg3);border-left:2px solid var(--red)}.rkp-row:last-child{border-bottom:none}
.rkp-row input[type=checkbox]{flex-shrink:0;accent-color:var(--red)}
.rkp-title{flex:1;font-weight:500;font-size:12px}.rkp-meta{font-size:11px;color:var(--text3)}
.rkp-num{width:32px}.rkp-num input{width:100%;font-size:12px;padding:2px 3px;border:1px solid var(--border2);background:var(--bg3);color:var(--red2);text-align:center;border-radius:0;outline:none}
.subrun-block{background:var(--bg3);border:1px solid var(--border);border-left:2px solid var(--border2);padding:.75rem;margin-bottom:6px}
.subrun-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.subrun-lbl{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--red3)}
/* Top 20 */
.ttbl{width:100%;border-collapse:collapse}.ttbl th{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border2)}
.ttbl td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:top;font-size:13px}.ttbl tr:hover td{background:var(--bg2)}
.rkc{font-size:18px;font-weight:500;color:var(--red3);width:26px;text-align:right;vertical-align:middle}
.dup{color:#4caf50;font-size:11px}.ddn{color:var(--red2);font-size:11px}.dno{font-size:11px;color:var(--text3)}
.tsc{font-size:11px;color:var(--text3);white-space:nowrap;vertical-align:middle}
/* Favs */
.fgd{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.fc{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--border2);padding:.75rem;transition:border-top-color .15s}.fc:hover{border-top-color:var(--red)}
.ft{font-weight:500;margin-bottom:2px;font-size:12px}.fa{color:var(--text3);font-size:10px}
/* Random banner */
.rb{background:var(--bg3);border:1px solid var(--border2);border-left:3px solid var(--red);padding:.875rem 1.1rem;margin-bottom:.875rem;display:flex;align-items:center;gap:10px}
.rbi{flex:1}.rbt{font-size:15px;font-weight:500}.rbs{font-size:11px;color:var(--text3);margin-top:2px}
.rbc{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 4px}.rbc:hover{color:var(--red2)}
/* 1001 */
.tbl2{width:100%;border-collapse:collapse;font-size:12px}.tbl2 th{text-align:left;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border2)}
.tbl2 td{padding:5px 8px;border-bottom:1px solid var(--border)}.tbl2 td.wr{white-space:normal;max-width:120px}.tbl2 tr:hover td{background:var(--bg2)}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:1rem}
.sc{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--border2);padding:.75rem;text-align:center;transition:border-top-color .15s}.sc:hover{border-top-color:var(--red)}
.sl{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}.sv{font-size:22px;font-weight:500}
.pb{height:2px;background:var(--border2);margin-top:5px;overflow:hidden}.pbf{height:100%;background:var(--red)}
/* Release type filter tabs */
.rel-tabs{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap}
.rel-tab{font-size:11px;padding:3px 10px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;border-radius:0;transition:all .12s}
.rel-tab:hover{border-color:var(--red);color:var(--text2)}
.rel-tab.active{background:var(--red3);border-color:var(--red);color:#fff}
/* Genre tag picker */
.genre-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--text2);margin:2px;border-radius:0;transition:all .12s}
.genre-pill:hover{border-color:var(--red);color:var(--text)}
.genre-pill.selected{background:var(--red3);border-color:var(--red);color:#fff}
/* Fav song autocomplete */
.favs-dropdown{position:absolute;z-index:200;background:var(--bg2);border:1px solid var(--border2);border-top:none;max-height:180px;overflow-y:auto;width:100%;left:0}
.favs-opt{padding:7px 10px;cursor:pointer;font-size:12px;color:var(--text);border-bottom:1px solid var(--border)}
.favs-opt:hover{background:var(--bg3);color:var(--red2)}
.favs-opt:last-child{border-bottom:none}
.favs-wrap{position:relative}
/* Release checklist */
.rcl-wrap{border:1px solid var(--border2);background:var(--bg2);overflow:hidden;margin-top:4px}
.rcl-header{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg3)}
.rcl-progress{flex:1;height:6px;background:var(--border2);border-radius:0;overflow:hidden}
.rcl-progress-bar{height:100%;background:var(--red);transition:width .2s}
.rcl-pct{font-size:11px;font-weight:600;color:var(--red2);min-width:36px;text-align:right}
.rcl-count{font-size:11px;color:var(--text3);white-space:nowrap}
.rcl-filter{display:flex;gap:2px;padding:6px 10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.rcl-tab{font-size:11px;padding:2px 9px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;border-radius:0;transition:all .12s}
.rcl-tab:hover{border-color:var(--red);color:var(--text2)}
.rcl-tab.active{background:var(--red3);border-color:var(--red);color:#fff}
.rcl-list{max-height:340px;overflow-y:auto}
.rcl-row{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);transition:background .1s}
.rcl-row:last-child{border-bottom:none}
.rcl-row.checked{background:rgba(185,28,28,.07)}
.rcl-row input[type=checkbox]{margin-top:3px;flex-shrink:0;accent-color:var(--red);width:14px;height:14px;cursor:pointer}
.rcl-info{flex:1;min-width:0}
.rcl-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.rcl-meta{font-size:11px;color:var(--text3);margin-top:1px}
.rcl-notes-area{margin-top:5px}
.rcl-notes-area textarea{width:100%;font-size:12px;padding:5px 7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);outline:none;resize:vertical;min-height:44px;border-radius:0;box-sizing:border-box}
.rcl-actions{display:flex;gap:4px;flex-shrink:0;margin-top:1px}
.rcl-btn{font-size:10px;padding:2px 7px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;border-radius:0;transition:all .12s;white-space:nowrap}
.rcl-btn:hover{border-color:var(--red);color:var(--text2)}
.rcl-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
/* Paths */
svg.pcv{width:100%;border:1px solid var(--border);background:var(--bg2);display:block}
</style>
</head>
<body>
<div class="app">
<div class="tabs">
  <button class="tab active" data-tab="runs">Discog runs</button>
  <button class="tab" data-tab="top20">Top 20</button>
  <button class="tab" data-tab="favs">Fav albums</button>
  <button class="tab" data-tab="k1001">1001 Albums</button>
  <button class="tab" data-tab="paths">Artist paths</button>
  <button class="tab" data-tab="stats">Stats</button>
</div>
<div style="background:var(--bg2);border-bottom:1px solid var(--border2);padding:5px 1rem;display:flex;justify-content:flex-end">
  <button class="btn" onclick="exportXLSX()" style="font-size:10px;height:24px">⬇ Export to Excel</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="MODAL" onclick="if(event.target===this)CM()">
  <div class="modal-box" id="MBOX"></div>
</div>

<div id="runs" class="section active">
  <div class="ctrl">
    <input type="text" id="SR" class="flex1" placeholder="Search artist..." oninput="RR()">
    <select id="FF" onchange="RR()"><option value="">All status</option><option value="Yes">Completed</option><option value="No">Incomplete</option></select>
    <select id="FY" onchange="RR()"><option value="">All years</option></select>
    <select id="FK" onchange="RR()"><option value="">Discography Ranked</option><option value="y">Yes</option><option value="n">No</option></select>
    <button class="btn-clr" onclick="CLR()">✕ Clear</button>
    <button class="btn btn-p" onclick="OAR()">+ Add run</button>
  </div>
  <div id="RL"></div>
</div>

<div id="top20" class="section">
  <div class="ctrl">
    <span style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">Top</span>
    <input type="number" id="TN" value="20" min="1" max="500" style="width:50px" oninput="RT()">
    <span style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">albums</span>
    <button class="btn btn-p" style="margin-left:auto" onclick="OAT()">+ Add</button>
  </div>
  <div id="TL"></div>
</div>

<div id="favs" class="section">
  <div class="ctrl">
    <input type="text" id="FS" class="flex1" placeholder="Search..." oninput="RF()">
    <button class="btn" onclick="PRF()">&#9632; Random</button>
    <button class="btn btn-p" onclick="OAF()">+ Add</button>
    <select onchange="favWaxFilter=this.value;RF()" style="font-size:11px;padding:5px 8px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);outline:none;height:30px">
      <option value="all">All albums</option>
      <option value="wax">On Wax only 💿</option>
      <option value="nowax">Not on Wax</option>
    </select>
  </div>
  <div id="FRB" style="display:none"></div>
  <div id="FL"></div>
</div>

<div id="k1001" class="section">
  <div class="ctrl">
    <input type="text" id="KS" class="flex1" placeholder="Search album or artist..." oninput="RK()">
    <select id="KF" onchange="RK()"><option value="">All</option><option value="1">Heard</option><option value="0">Not yet</option></select>
    <button class="btn btn-p" onclick="OAK()">+ Log</button>
  </div>
  <div class="ctrl" style="margin-top:-4px">
    <select id="KGP" style="min-width:130px"><option value="">Any genre</option></select>
    <button class="btn" onclick="PRK()">&#9632; Pick unheard</button>
  </div>
  <div id="KRB" style="display:none"></div>
  <div id="KST" style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:7px"></div>
  <div id="KL"></div>
</div>

<div id="paths" class="section">
  <div class="ctrl">
    <select id="PS" onchange="RPG()" style="flex:1;font-size:13px;padding:8px 12px;height:auto"><option value="">— Select a path —</option></select>
    <button class="btn btn-p" onclick="OAP()">+ New path</button>
  </div>
  <div id="PG"></div>
</div>

<div id="stats" class="section"><div id="SS"></div></div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
// ── Export to Excel ───────────────────────────────────────────────────
function exportXLSX() {
  if (typeof XLSX === 'undefined') {
    alert('SheetJS not loaded. Make sure you are connected to the internet.');
    return;
  }

  const wb = XLSX.utils.book_new();

  // ── RERUN sheet ──────────────────────────────────────────────────────
  const runRows = [['Year','OG Start','OG Fin','Artist','Finished?','First Run Fav Song',
    'LPs','EPs','MTs','Singles','Notes',
    'Rerun Start','Rerun End','Rerun Fav','Rerun LPs','Rerun EPs','Rerun MTs','Rerun Singles','Rerun Finished?']];
  D.runs.forEach(r => {
    const s1 = r.subruns?.[0] || {};
    const s2 = r.subruns?.[1] || {};
    const yr = s1.startDate ? new Date(s1.startDate+'T12:00:00').getFullYear() : (r.year||'');
    runRows.push([
      yr, s1.startDate||'', s1.endDate||'', r.artist,
      s1.finished||'', s1.favSong||'',
      s1.lps||'', s1.eps||'', s1.mts||'', s1.singles||'',
      r.notes||'',
      s2.startDate||'', s2.endDate||'', s2.favSong||'',
      s2.lps||'', s2.eps||'', s2.mts||'', s2.singles||'',
      s2.finished||''
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(runRows), 'RERUN');

  // ── Top 20 ───────────────────────────────────────────────────────────
  const topRows = [['Rank','Artist','Album','Year','Notes']];
  [...D.top20].sort((a,b)=>a.rank-b.rank).forEach(t => {
    topRows.push([t.rank, t.artist, t.album, t.year||'', t.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(topRows), 'Top 20 Albums');

  // ── Fav Albums ───────────────────────────────────────────────────────
  const favRows = [['Artist','Album','Year','Genre','Own on Wax?','Notes']];
  D.favs.forEach(f => {
    favRows.push([f.artist, f.album, f.year||'', f.genre||'', f.ownOnWax?'Yes':'No', f.notes||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(favRows), 'Fav Albums');

  // ── 1001 Albums ──────────────────────────────────────────────────────
  const kRows = [['Artist','Title','Release Year','Listened?','Listen Date','Run Time','Genre','Songs','Decade','Rating','Notes']];
  D.k1001.forEach(k => {
    kRows.push([
      k.artist, k.album, k.year||'',
      k.heard ? 'Yes' : 'No',
      k.listenDate||'', k.runtime||'',
      k.genre||'', k.songs||'', k.decade||'',
      k.rating||'', k.notes||''
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(kRows), '1001 Albums THBYD');

  // ── Discog Rankings ──────────────────────────────────────────────────
  const rkRows = [['Artist','LP Name','Release Year','Rank']];
  D.runs.forEach(r => {
    (r.rankings||[]).sort((a,b)=>a.rank-b.rank).forEach(k => {

  // ── Follow-ups ───────────────────────────────────────────────────────

  });

  // ── Download ─────────────────────────────────────────────────────────
  const date = new Date().toISOString().slice(0,10);

}

// Migrate + normalize
D.runs.forEach(r => {

});

// Load saved state from localStorage (preserves edits across sessions)
try {
  const saved = localStorage.getItem('mtqotsa3');
  if (saved) {
    const ld = JSON.parse(saved);
    if (ld && ld.runs && ld.runs.length > 0) {
      D = ld;
      // Always restore seed data for keys missing from saved state
      D.paths = SEED_PATHS;  // paths are read-only — always use seed
      if (!D.favs   || !D.favs.length)   D.favs   = SEED_FAVS;
      if (!D.top20  || !D.top20.length)  D.top20  = SEED_TOP20;
      if (!D.k1001  || !D.k1001.length)  D.k1001  = SEED_K1001;
      if (!D.followups) D.followups = SEED_FOLLOWUPS;
      D.runs.forEach(r => {
        if (!r.subruns) {
          r.subruns = [{startDate:r.startDate||'',endDate:r.endDate||'',favSong:r.favSong||'',finished:r.finished||''}];
          if (r.rerunStart) r.subruns.push({startDate:r.rerunStart||'',endDate:r.rerunEnd||'',favSong:r.rerunFav||'',finished:r.rerunFinished||''});
        }
        if (!r.rankings) r.rankings = [];
        if (!r.releases) r.releases = [];
      });
      D.k1001.forEach(k => {
        ['genre','listenDate','runtime','decade'].forEach(f => { if (!k[f]) k[f] = ''; });
        if (!k.songs) k.songs = null;
      });
    }
  }
} catch(e) {}

// - Helpers -
const fmt = d => { if (!d) return ''; try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}); } catch(e) { return d; } };
const fmtS = d => { if (!d) return '—'; try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', {month:'short', year:"2-digit"}); } catch(e) { return d; } };
function fts(ts) {
  if (!ts) return '—';
  const diff = Date.now() - ts, days = Math.floor(diff / 86400000);
  if (days === 0) { const h = Math.floor(diff/3600000); return h === 0 ? (Math.floor(diff/60000) <= 1 ? 'now' : Math.floor(diff/60000)+'m') : h+'h'; }
  if (days === 1) return 'yest.';
  if (days < 7) return days+'d';
  return new Date(ts).toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

// - Sort state -
let sortF = 'startDate', sortD = -1;
function setSort(f) {
  if (sortF === f) sortD *= -1; else { sortF = f; sortD = f === 'artist' ? 1 : -1; }
  RR();
}
function sortRuns(arr) {
  return [...arr].sort((a, b) => {
    let av, bv;
    const s1a = a.subruns?.[0] || {}, s1b = b.subruns?.[0] || {};
    if (sortF === 'artist')     { av = a.artist||''; bv = b.artist||''; }
    else if (sortF === 'start') { av = s1a.startDate||''; bv = s1b.startDate||''; }
    else if (sortF === 'done')  { av = s1a.finished||''; bv = s1b.finished||''; }
    else if (sortF === 'nruns') { av = (a.subruns||[]).length; bv = (b.subruns||[]).length; }
    else if (sortF === 'fav')   { av = s1a.favSong||''; bv = s1b.favSong||''; }
    else if (sortF === 'genre') { av = a.genre||''; bv = b.genre||''; }
    else if (sortF === 'notes') { av = a.notes||''; bv = b.notes||''; }
    else { av = a[sortF]||''; bv = b[sortF]||''; }
    if (av < bv) return -1 * sortD;
    if (av > bv) return  1 * sortD;
    return 0;
  });
}
function TH(f, lbl) {
  const arrow = sortF === f ? (sortD === 1 ? ' ▲' : ' ▼') : ' ⇅';
  return `<th onclick="setSort('${f}')" class="${sortF===f?'sorted':''}" style="cursor:pointer">${lbl}<span style="opacity:${sortF===f?1:.35};color:${sortF===f?'var(--red2)':'inherit'}">${arrow}</span></th>`;
}

// - Release count helper -
function relCounts(s) {
  if (!s) return '';
  const parts = [];
  if (s.lps)     parts.push(s.lps + (s.lps===1?' LP':' LPs'));
  if (s.eps)     parts.push(s.eps + (s.eps===1?' EP':' EPs'));
  if (s.mts)     parts.push(s.mts + ' MT' + (s.mts===1?'':'s'));
  if (s.singles) parts.push(s.singles + (s.singles===1?' single':' singles'));
  return parts.join(', ');
}

// - Clear filters -
function CLR() { $('SR').value=''; $('FF').value=''; $('FY').value=''; $('FK').value=''; RR(); }

// - RUNS -
function RR() {
  const q = ($('SR').value||'').toLowerCase(), fin = $('FF').value, yr = $('FY').value, rk = $('FK').value;
  const ySel = $('FY');
  const yrs = [...new Set(D.runs.map(r => r.year).filter(Boolean))].sort((a,b) => b-a);
  if (ySel.options.length <= 1) yrs.forEach(y => { const o = document.createElement('option'); o.value = y; o.text = y; ySel.appendChild(o); });
  let runs = [...D.runs];
  if (q)    runs = runs.filter(r => (r.artist||'').toLowerCase().includes(q));
  if (fin)  runs = runs.filter(r => (r.subruns?.[0]?.finished||'') === fin);
  if (yr)   runs = runs.filter(r => String(r.year) === yr);
  if (rk === 'y') runs = runs.filter(r => (r.rankings||[]).length > 0);
  if (rk === 'n') runs = runs.filter(r => !(r.rankings||[]).length);
  runs = sortRuns(runs);
  const el = $('RL');
  if (!runs.length) { el.innerHTML = '<div class="empty">— No runs found —</div>'; return; }
  el.innerHTML = `<table class="run-tbl"><thead><tr>
    ${TH('artist','Artist')}${TH('start','First run')}<th>Releases</th>${TH('done','Completed?')}${TH('fav','Fav song')}
    <th>Reruns</th>${TH('genre','Genre')}${TH('notes','Notes')}
  </tr></thead><tbody>` +
  runs.map(r => {
    const s1 = r.subruns?.[0] || {};
    const rks = r.rankings || [];
    const reruns = (r.subruns||[]).slice(1);
    const rerunsSummary = reruns.length
      ? reruns.map((s,i) => {
          const done = s.finished==='Yes' ? '<span style="color:#4caf50">✓</span>' : s.finished==='No' ? '<span style="color:#e74c3c">✗</span>' : '';
          const rc = relCounts(s); const yr2 = s.startDate?new Date(s.startDate+'T12:00:00').getFullYear():''; return `<span style="white-space:nowrap">Run ${i+2}: ${yr2?yr2+'  ':''}${fmtS(s.startDate)}${rc?' '+rc:''} ${done}</span>`;
        }).join('<br>')
      : '<span style="color:var(--text3)">—</span>';
    return `<tr>
      <td style="white-space:nowrap">
        <a href="#" onclick="event.preventDefault();OER('${r.id}')" style="color:var(--text);font-weight:500;text-decoration:none;border-bottom:1px solid var(--border2)">${r.artist}${rks.length?'<span class="rk-dot"></span>':''}</a>
      </td>

// - Release checklist -
let pRels = [], rkSt = [], rclFilter = 'All';

function rclFilteredRels() {
  if (rclFilter === 'All') return pRels;
  return pRels.filter(r => (r.type||'LP') === rclFilter);
}

function rclProgress() {
  const total = pRels.length;
  const checked = pRels.filter(r => r._c).length;
  const pct = total ? Math.round(checked / total * 100) : 0;
  return { total, checked, pct };
}

function rclUpdateProgress() {
  const bar = document.getElementById('rcl-bar');
  const pctEl = document.getElementById('rcl-pct');
  const countEl = document.getElementById('rcl-count');
  const { total, checked, pct } = rclProgress();
  if (bar) bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (countEl) countEl.textContent = checked + ' / ' + total;
  // auto-set Run Completed when all checked
  if (total > 0 && checked === total) {
    document.querySelectorAll('[id^="src"]').forEach(sel => { if (sel.tagName === 'SELECT') sel.value = 'Yes'; });
  }
}

function RLP(cid) {
  const el = $(cid); if (!el || !pRels.length) return;
  const tabs = ['All','LP','EP','MT','Single','Other'];
  const filtered = rclFilteredRels();
  const { total, checked, pct } = rclProgress();
  el.innerHTML = `
    <div class="rcl-wrap">
      <div class="rcl-header">
        <div class="rcl-progress"><div class="rcl-progress-bar" id="rcl-bar" style="width:${pct}%"></div></div>
        <span class="rcl-pct" id="rcl-pct">${pct}%</span>
        <span class="rcl-count" id="rcl-count">${checked} / ${total}</span>
      </div>
      <div class="rcl-filter">
        ${tabs.map(f => `<button class="rcl-tab${f===rclFilter?' active':''}" onclick="rclSetFilter('${f}')">${f}</button>`).join('')}
      </div>
      <div class="rcl-list">
        ${filtered.map(r => {
          const i = pRels.indexOf(r);
          const safeTitle = r.title.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/'/g,'&#39;');
          return `<div class="rcl-row${r._c?' checked':''}" id="rcl-row-${i}">
            <input type="checkbox" ${r._c?'checked':''} onchange="rclToggle(${i})">
            <div class="rcl-info">
              <div class="rcl-title">${r.title}</div>
              <div class="rcl-meta">${r.year||''}${r.type?' · '+r.type:''}</div>
              ${r._showNotes ? `<div class="rcl-notes-area">
                <textarea placeholder="Notes…" oninput="pRels[${i}]._n=this.value">${r._n||''}</textarea>
              </div>` : ''}
            </div>
            <div class="rcl-actions">
              <button class="rcl-btn${r._showNotes?' active':''}" onclick="rclToggleNotes(${i})" title="Notes">+ Notes</button>
              <button class="rcl-btn" onclick="rclRemove(${i})" title="Remove">✕</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function rclSetFilter(f) {
  rclFilter = f;
  RLP('LR');
}

function rclToggle(i) {
  if (!pRels[i]) return;
  pRels[i]._c = !pRels[i]._c;
  // update just the row class and re-render progress without full re-render
  const row = document.getElementById('rcl-row-' + i);
  if (row) row.classList.toggle('checked', pRels[i]._c);
  rclUpdateProgress();
  sRk(); renderRkP();
}

function rclToggleNotes(i) {
  if (!pRels[i]) return;
  pRels[i]._showNotes = !pRels[i]._showNotes;
  RLP('LR');
}

function rclRemove(i) {
  pRels.splice(i, 1);
  RLP('LR');
  sRk(); renderRkP();
}

function TP(i,c) { rclToggle(i); }
function gC() { return pRels.filter(r=>r._c).map(r=>({title:r.title,year:r.year,type:r.type||'LP',favSong:r._f||'',note:r._n||''})); }
function sRk() {
  const ex = new Set(rkSt.map(r=>r.t.toLowerCase()));
  pRels.forEach(r => { if (!ex.has(r.title.toLowerCase())) rkSt.push({t:r.title,y:r.year,tp:r.type,c:false,rk:null}); });
  const all = new Set(pRels.map(r=>r.title.toLowerCase()));
  rkSt = rkSt.filter(r => all.has(r.t.toLowerCase()));
}
// ── Fav Song autocomplete ─────────────────────────────────────────────
let favSongCache = {}, favSongAll = [], _mbArtistId = null;

async function loadFavSongs(mbid, artistName) {
  const key = mbid || artistName; if (!key) return;
  if (favSongCache[key]) { favSongAll = favSongCache[key]; return; }
  try {
    let resolvedMBID = mbid;
    if (!resolvedMBID && artistName) {
      const sr = await fetch(`https://musicbrainz.org/ws/2/artist/?query=artist:${encodeURIComponent(artistName)}&limit=1&fmt=json`, { headers: {'User-Agent':'MusicTrackerApp/1.0'} });
      const sd = await sr.json();
      resolvedMBID = sd.artists?.[0]?.id;
    }
    if (!resolvedMBID) return;
    const res = await fetch(`https://musicbrainz.org/ws/2/recording?artist=${resolvedMBID}&limit=100&fmt=json`, { headers: {'User-Agent':'MusicTrackerApp/1.0'} });
    const data = await res.json();
    const recs = (data.recordings||[]).map(r => ({ title: r.title, album: r.releases?.[0]?.title||'', year: r.releases?.[0]?.date?.slice(0,4)||'' }));
    const seen = new Set();
    const deduped = recs.filter(r => { const k=r.title.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
    favSongCache[key] = deduped; favSongAll = deduped;
  } catch(e) { favSongAll = []; }
}

function showFavSongDropdown(inputEl, query) {
  let dd = inputEl.parentNode.querySelector('.favs-dropdown');
  if (!dd) { dd = document.createElement('div'); dd.className = 'favs-dropdown'; inputEl.parentNode.appendChild(dd); }
  const q = (query||'').toLowerCase();
  if (!q) { dd.style.display='none'; return; }
  if (!favSongAll.length) {
    dd.style.display='block';
    dd.innerHTML = '<div class="favs-opt" style="color:var(--text3);font-style:italic;cursor:default">Click \u201cLook up \u2197\u201d first to enable song search</div>';
    return;
  }
  const matches = favSongAll.filter(r => r.title.toLowerCase().includes(q)).slice(0,20);
  if (!matches.length) { dd.style.display='none'; return; }
  dd.style.display = 'block';
  dd.innerHTML = matches.map(r => {
    const safeTitle = r.title.replace(/\\/g,'\\\\').replace(/'/g,"&#39;").replace(/"/g,"&quot;");
    return `<div class="favs-opt" onmousedown="event.preventDefault();pickFavSong(this.closest('.favs-wrap').querySelector('.favsong-inp'),'${safeTitle}')">${r.title}<span style="color:var(--text3);font-size:11px;margin-left:8px">${r.album?r.album+' ':''}${r.year?'('+r.year+')':''}</span></div>`;
  }).join('');
}

function pickFavSong(input, title) {
  if (!input) return;
  input.value = title;
  const dd = input.parentNode.querySelector('.favs-dropdown');
  if (dd) dd.style.display = 'none';
  const idx = input.dataset.sridx;
  if (idx !== undefined && window._subruns[+idx]) window._subruns[+idx].favSong = title;
}

function hideFavDD(input) {
  setTimeout(() => { const dd = input?.parentNode?.querySelector('.favs-dropdown'); if (dd) dd.style.display='none'; }, 180);
}

// ── lookupArtistFull: releases + genre tags + songs ──────────────────
function reqD(artist) { lookupArtistFull(artist); }

async function lookupArtistFull(artist) {
  const el = $('LR');
  if (!el || !artist) return;
  rclFilter = 'All';
  el.innerHTML = `<div class="hint" style="color:var(--text2)"><span style="color:var(--red2)">●</span> Searching MusicBrainz for <strong>${artist}</strong>…</div>`;
  try {
    const res = await fetch(
      `https://musicbrainz.org/ws/2/artist/?query=artist:${encodeURIComponent(artist)}&limit=6&fmt=json&inc=tags`,
      { headers: { 'User-Agent': 'MusicTrackerApp/1.0 (personal use)' } }
    );
    const data = await res.json();
    const artists = data.artists || [];
    if (!artists.length) { el.innerHTML = `<div class="hint" style="color:var(--red2)">No artist found for "${artist}".</div>`; return; }
    const topScore = artists[0]?.score || 0;
    const nameMatch = artists[0]?.name?.toLowerCase() === artist.toLowerCase();
    if (artists.length === 1 || (topScore >= 95 && nameMatch)) {
      await pickArtistAndLoad(artists[0], el);
    } else {
      el.innerHTML = `<div class="hint" style="color:var(--text2);margin-bottom:5px">Multiple matches — pick the right one:</div>
        <div style="border:1px solid var(--border);background:var(--bg2);overflow:hidden">` +
        artists.slice(0,5).map(a => {
          const dis = a.disambiguation ? ` <em style="color:var(--text3);font-size:11px">(${a.disambiguation})</em>` : '';
          return `<div style="padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px"
            onmouseover="this.style.background='var(--bg3)'" onmouseout="this.style.background=''"
            onclick="pickArtistAndLoad(${JSON.stringify(a).replace(/"/g,'&quot;')},document.getElementById('LR'))">
            <strong style="color:var(--text)">${a.name}</strong>${dis}
            <span style="color:var(--text3);font-size:11px;margin-left:6px">${a.country||''} ${a.score||''}%</span>
          </div>`;
        }).join('') + `</div>`;
    }
  } catch(err) {
    el.innerHTML = `<div class="hint" style="color:var(--red2)">Error: ${err.message}</div>`;
  }
}

async function pickArtistAndLoad(artist, el) {
  _mbArtistId = artist.id;
  const tags = (artist.tags || []).sort((a,b) => b.count - a.count).slice(0,5);
  if (tags.length) {
    const gInp = $('mg');
    if (gInp && !gInp.value) gInp.value = tags[0].name;
    showGenrePicker(tags, 'mg');
  }
  loadFavSongs(artist.id, artist.name);
  await fetchReleasesForMBID(artist.id, artist.name);
}

async function fetchReleasesForMBID(mbid, artistName) {
  const el = $('LR');
  if (!el) return;
  el.innerHTML = `<div class="hint" style="color:var(--text2);padding:6px 0">
    <span style="color:var(--red2)">●</span> Fetching releases for <strong>${artistName}</strong>…
  </div>`;
  try {
    const rgUrl = `https://musicbrainz.org/ws/2/release-group?artist=${mbid}&type=album|ep|single&limit=100&fmt=json`;
    const rgResp = await fetch(rgUrl, { headers: { 'User-Agent': 'MusicTrackerApp/1.0 (personal use)' } });
    if (!rgResp.ok) throw new Error(`Release fetch failed: ${rgResp.status}`);
    const rgData = await rgResp.json();
    const rgs = (rgData['release-groups'] || []);
    if (!rgs.length) { el.innerHTML = `<div class="hint" style="color:var(--red2)">No releases found for this artist.</div>`; return; }
    const typeMap = { 'Album':'LP', 'EP':'EP', 'Single':'Single', 'Mixtape/Street':'MT', 'Other':'Other' };
    const releases = rgs
      .map(rg => {
        const primaryType = rg['primary-type'] || 'Album';
        const secondaryTypes = rg['secondary-types'] || [];
        if (secondaryTypes.some(t => ['Compilation','Live','Remix','DJ-mix','Spokenword','Audiobook'].includes(t))) return null;
        return { title: rg.title, year: rg['first-release-date'] ? +rg['first-release-date'].slice(0,4) : null, type: typeMap[primaryType] || primaryType, mbid: rg.id };
      })
      .filter(Boolean).filter(r => r.year).filter(r => ['LP','EP','MT'].includes(r.type)).sort((a,b) => a.year - b.year);
    if (!releases.length) { el.innerHTML = `<div class="hint" style="color:var(--red2)">No studio releases found (compilations and live albums excluded).</div>`; return; }
    const ex = new Set(pRels.map(r => r.title.toLowerCase()));
    releases.filter(r => !ex.has(r.title.toLowerCase())).forEach(r => pRels.push({ ...r, _c:false, _f:'', _n:'' }));
    RLP('LR');
    sRk(); renderRkP();
    const lpCount=releases.filter(r=>r.type==='LP').length, epCount=releases.filter(r=>r.type==='EP').length, sCount=releases.filter(r=>r.type==='Single').length;
    const summary=[lpCount?`${lpCount} LP${lpCount!==1?'s':''}`:'' ,epCount?`${epCount} EP${epCount!==1?'s':''}`:'' ,sCount?`${sCount} single${sCount!==1?'s':''}`:'' ].filter(Boolean).join(', ');
    const existing = el.innerHTML;
    el.innerHTML = `<div class="hint" style="color:var(--text2);padding:4px 0 6px"><span style="color:#4caf50">✓</span> Found <strong>${releases.length}</strong> releases via MusicBrainz — ${summary}</div>` + existing;
  } catch(err) {
    el.innerHTML = `<div class="hint" style="color:var(--red2)">Error fetching releases: ${err.message}</div>`;
  }
}

function setKSort(f) {
  if (k1001Sort===f) k1001SortDir*=-1;
  else { k1001Sort=f; k1001SortDir = (f==='heard'||f==='year'||f==='songs'||f==='runtime')?1:1; }
  RK();
}
function sortK1001(arr) {
  return [...arr].sort((a,b) => {
    // Primary sort
    let av, bv;
    const f = k1001Sort;
    if      (f==='year')   { av=+(a.year||0);    bv=+(b.year||0); }
    else if (f==='songs')  { av=+(a.songs||0);   bv=+(b.songs||0); }
    else if (f==='heard')  { av=a.heard?1:0;      bv=b.heard?1:0; }
    else if (f==='listenDate') { av=a.listenDate||''; bv=b.listenDate||''; }
    else                   { av=(a[f]||'').toString().toLowerCase(); bv=(b[f]||'').toString().toLowerCase(); }
    if (av<bv) return -1*k1001SortDir;
    if (av>bv) return  1*k1001SortDir;
    // Secondary: year asc, then artist asc
    if (f!=='year')   { const ya=+(a.year||0),yb=+(b.year||0); if(ya!==yb) return ya-yb; }
    if (f!=='artist') { return (a.artist||'').localeCompare(b.artist||''); }
    return 0;
  });
}
function RK() {
  const q=($('KS').value||'').toLowerCase(), fil=$('KF').value;
  let it=[...D.k1001];
  if (q) it=it.filter(f=>(f.artist+' '+f.album+(f.genre||'')).toLowerCase().includes(q));
  if (fil==='1') it=it.filter(f=>f.heard);
  if (fil==='0') it=it.filter(f=>!f.heard);
  it = sortK1001(it);
  const h=D.k1001.filter(x=>x.heard).length;
  $('KST').textContent=`${h} of ${D.k1001.length} · ${Math.round(h/Math.max(D.k1001.length,1)*100)}% heard`;
  UKG();
  const el=$('KL');
  if (!it.length) { el.innerHTML='<div class="empty">— Nothing —</div>'; return; }
  const arr = f => k1001Sort===f?(k1001SortDir===1?'▲':'▼'):'⇅';
  const th = (f,lbl,w) => `<th onclick="setKSort('${f}')" style="cursor:pointer${w?';width:'+w:''}" class="${k1001Sort===f?'sorted':''}">${lbl} <span style="opacity:${k1001Sort===f?1:.35};color:${k1001Sort===f?'var(--red2)':'inherit'}">${arr(f)}</span></th>`;
  const show = it.slice(0,200);
  el.innerHTML = `<div style="overflow-x:auto"><table class="tbl2"><thead><tr>
    ${th('artist','Artist')}${th('album','Album')}${th('year','Year','52px')}
    ${th('genre','Genre','90px')}${th('decade','Decade','70px')}
    ${th('runtime','Runtime','70px')}${th('songs','Tracks','56px')}
    ${th('listenDate','Listen date','88px')}${th('heard','Heard','56px')}
    <th style="width:50px"></th>
  </tr></thead><tbody>` +
  show.map(f=>`<tr>
    <td class="wr">${f.artist}</td>
    <td class="wr">${f.album}</td>
    <td style="white-space:nowrap">${f.year||'—'}</td>
    <td>${f.genre||'—'}</td>
    <td>${f.decade||'—'}</td>
    <td>${f.runtime||'—'}</td>
    <td>${f.songs||'—'}</td>
    <td style="white-space:nowrap">${f.listenDate?fmt(f.listenDate):'—'}</td>
    <td><span class="badge ${f.heard?'b-yes':'b-gray'}">${f.heard?'Yes':'No'}</span></td>
    <td><button class="btn btn-sm" onclick="EK('${f.id}')">Edit</button></td>
  </tr>`).join('') +
  `</tbody></table></div>` +
  (it.length>200?`<div style="font-size:10px;color:var(--text3);margin-top:6px">Showing 200 of ${it.length} — use search to filter</div>`:'');
}

function RPL() {
  const s=$('PS'), pv=s.value;
  s.innerHTML='<option value="">Select a path...</option>'+
    D.paths.map(p=>`<option value="${p.id}"${p.id===pv?' selected':''}>${p.name} (${p.nodes.length})</option>`).join('');

function isPathNote(str) {
  if (!str) return false;
  if (str.length > 35) return true;
  const sigs = ['new starting artist','nope','love her','SH has his lane','some gems',
    'loved it','loved her','punish','boring','great head','chill.','Random slap',
    'interesting enough','hit and miss','stepped it up','couldn\'t get','could not get'];
  return sigs.some(s => str.toLowerCase().includes(s.toLowerCase()));
}

function RPG() {
  const id = $('PS').value;
  $('ANB').style.display = id ? 'inline-block' : 'none';
  const el = $('PG');
  if (!id) { el.innerHTML='<div class="empty">— Select or create a path —</div>'; return; }
  const path = D.paths.find(p=>p.id===id);
  if (!path||!path.nodes.length) { el.innerHTML='<div class="empty">— No artists yet —</div>'; return; }

  const nodes = path.nodes;

  // Build display items — artists are pills, notes are inline callouts
  let html = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase">
        ${nodes.filter(n=>!isPathNote(n.artist)).length} artists
      </span>
      <span class="badge b-genre">${path.nodes[0]?.genre||''}</span>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-left:2px solid var(--red3);padding:1.25rem 1rem;overflow-x:auto">
      <div style="display:flex;flex-wrap:wrap;gap:0;align-items:flex-start;min-width:0">`;

  nodes.forEach((n, i) => {
    const isNote = isPathNote(n.artist);
    const isFirst = i === 0;
    const isLast = i === nodes.length - 1;
    const prevIsNote = i > 0 && isPathNote(nodes[i-1].artist);
    const nextIsNote = i < nodes.length-1 && isPathNote(nodes[i+1].artist);
    const num = nodes.slice(0, i+1).filter(x=>!isPathNote(x.artist)).length;

    if (isNote) {
      // Inline note — italic callout in a different style
      html += `
        <div style="
          display:flex;align-items:center;gap:4px;
          margin:4px 0 4px 2px;
          padding:4px 8px;
          background:rgba(192,57,43,0.08);
          border-left:2px solid var(--red3);
          font-size:10px;font-style:italic;color:var(--text3);
          max-width:220px;line-height:1.4;
          align-self:center;flex-shrink:0;
        ">💬 ${n.artist}</div>`;
    } else {
      // Artist pill
      const bg = isFirst ? 'var(--red3)' : 'var(--bg3)';
      const border = isFirst ? 'var(--red)' : 'var(--border2)';
      const txColor = isFirst ? '#fff' : 'var(--text)';
      const numColor = isFirst ? 'rgba(255,255,255,0.5)' : 'var(--text3)';

      // Arrow connector before this node (not before first)
      if (i > 0 && !prevIsNote) {
        html += `<div style="display:flex;align-items:center;align-self:center;flex-shrink:0;padding:0 4px;color:var(--red3);font-size:14px;margin-top:4px">›</div>`;
      } else if (i > 0 && prevIsNote) {
        html += `<div style="display:flex;align-items:center;align-self:center;flex-shrink:0;padding:0 4px;color:var(--red3);font-size:14px;margin-top:4px">›</div>`;
      }

      html += `
        <div style="
          display:inline-flex;align-items:center;gap:6px;
          margin:4px 0;flex-shrink:0;
          background:${bg};border:1px solid ${border};
          padding:5px 10px 5px 6px;cursor:default;
        ">
          <span style="
            font-size:10px;color:${numColor};
            min-width:16px;text-align:center;
            font-variant-numeric:tabular-nums;font-weight:500;
          ">${num}</span>
          <span style="font-size:12px;color:${txColor};font-weight:${isFirst?500:400}">${n.artist}</span>
        </div>`;
    }
  });

  html += `</div></div>
    <div style="margin-top:8px;font-size:10px;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap">
      <span>
        <span style="display:inline-block;width:9px;height:9px;background:var(--red3);border:1px solid var(--red);vertical-align:middle;margin-right:4px"></span>Starting artist
      </span>
      <span>
        <span style="display:inline-block;width:9px;height:9px;background:var(--bg3);border:1px solid var(--border2);vertical-align:middle;margin-right:4px"></span>Discovered via similar artists
      </span>
      <span>
        <span style="display:inline-block;width:9px;height:9px;border-left:2px solid var(--red3);vertical-align:middle;margin-right:4px"></span>Notes
      </span>
    </div>`;

  el.innerHTML = html;
}

function RSS() {
  const n = D.runs.length;
  const uArtists = new Set(D.runs.map(r=>r.artist)).size;
  const completed = D.runs.filter(r=>(r.subruns?.[0]?.finished||'')==='Yes').length;
  const rerunned  = D.runs.filter(r=>(r.subruns||[]).length>1).length;
  const ranked    = D.runs.filter(r=>(r.rankings||[]).length>0).length;
  const h1001     = D.k1001.filter(f=>f.heard).length;
  const totalLPs  = D.runs.reduce((a,r)=>(r.subruns||[]).reduce((b,s)=>b+(s.lps||0),a),0);
  const totalEPs  = D.runs.reduce((a,r)=>(r.subruns||[]).reduce((b,s)=>b+(s.eps||0),a),0);

  // Runs per year
  const byYear = {};
  D.runs.forEach(r => { const y = r.subruns?.[0]?.startDate?.slice(0,4)||String(r.year||''); if(y) byYear[y]=(byYear[y]||0)+1; });
  const yrKeys = Object.keys(byYear).sort();

  // LPs per year
  const lpsByYear = {};
  D.runs.forEach(r=>(r.subruns||[]).forEach(s=>{ const y=s.startDate?.slice(0,4); if(y&&s.lps) lpsByYear[y]=(lpsByYear[y]||0)+s.lps; }));

  // Genre breakdown
  const genreCounts = {};
  D.runs.forEach(r=>{ if(r.genre) genreCounts[r.genre]=(genreCounts[r.genre]||0)+1; });
  const genres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // Top revisited artists (reruns)
  const rerunCounts = {};
  D.runs.forEach(r=>{ const rc=(r.subruns||[]).length-1; if(rc>0) rerunCounts[r.artist]=(rerunCounts[r.artist]||0)+rc; });
  const topReruns = Object.entries(rerunCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);

  // 1001 by genre heard vs unheard
  const kGenres = {};
  D.k1001.forEach(k=>{ if(k.genre){ if(!kGenres[k.genre]) kGenres[k.genre]={h:0,n:0}; k.heard?kGenres[k.genre].h++:kGenres[k.genre].n++; } });
  const topK = Object.entries(kGenres).sort((a,b)=>(b[1].h+b[1].n)-(a[1].h+a[1].n)).slice(0,10);

  // 1001 by decade
  const kDecade = {};
  D.k1001.forEach(k=>{ if(k.decade){ if(!kDecade[k.decade]) kDecade[k.decade]={h:0,n:0}; k.heard?kDecade[k.decade].h++:kDecade[k.decade].n++; } });
  const topDec = Object.entries(kDecade).sort((a,b)=>a[0].localeCompare(b[0]));

  // - colour palette -
  const C = { red:'#c0392b', red2:'#e74c3c', red3:'#922b21', grn:'#1a9e5c',
               pur:'#7c5cbf', amb:'#d4890a', blu:'#2a7dc4',
               tx:'#e8e8e8', tx3:'#5a5a5a', bd:'#2a2a2a', bg2:'#161616', bg3:'#1e1e1e' };

  // - helper: vBar -
  function vBar(data, title, color, subtitle='') {
    if (!data.length) return '';
    const vals = data.map(d=>d[1]), max = Math.max(...vals,1);
    const W=560, chartH=110, padL=6, padR=6;
    const bw = Math.max(6, Math.min(44, Math.floor((W-padL-padR)/data.length)-3));
    const totalW = data.length*(bw+3)-3;
    const sx = padL + Math.floor((W-padL-padR-totalW)/2);
    const h = chartH+46;
    const bars = data.map(([lbl,val],i) => {
      const bh = Math.round((val/max)*chartH);
      const x = sx+i*(bw+3), y = chartH-bh;
      const fs = bw>30?9:7;
      const yr2 = lbl.length>4?lbl.slice(2):lbl;
      return `<g>
        <rect x="${x}" y="${y}" width="${bw}" height="${bh}" fill="${color}" rx="1" opacity="${0.75+0.25*(val/max)}"/>
        ${bh>14?`<text x="${x+bw/2}" y="${y+bh/2+1}" text-anchor="middle" dominant-baseline="central" fill="${C.tx}" font-size="${fs}" font-family="system-ui">${val}</text>`:''}
        <text x="${x+bw/2}" y="${chartH+13}" text-anchor="middle" fill="${C.tx3}" font-size="8" font-family="system-ui">${yr2}</text>
      </g>`;
    }).join('');
    return `<div style="background:${C.bg2};border:1px solid ${C.bd};padding:1rem;margin-bottom:.75rem;border-left:2px solid ${color}">
      <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:${C.tx3};margin-bottom:${subtitle?'2px':'10px'}">${title}</div>
      ${subtitle?`<div style="font-size:11px;color:${C.tx3};margin-bottom:10px">${subtitle}</div>`:''}
      <svg width="100%" viewBox="0 0 ${W} ${h}">
        <line x1="0" y1="${chartH}" x2="${W}" y2="${chartH}" stroke="${C.bd}" stroke-width="1"/>
        ${bars}
      </svg>
    </div>`;
  }

  // - helper: hBar -
  function hBar(data, title, color, showPct=false, total=0, subtitle='') {
    if (!data.length) return '';
    const W=560, BAR=20, GAP=5, labelW=140, maxBW=320;
    const max = Math.max(...data.map(d=>d[1]),1);
    const h = data.length*(BAR+GAP)+30;
    const bars = data.map(([lbl,val],i) => {
      const bw = Math.round((val/max)*maxBW);
      const y = i*(BAR+GAP);
      const short = lbl.length>20?lbl.slice(0,19)+'…':lbl;
      const pct = showPct&&total?` (${Math.round(val/total*100)}%)`:'';
      return `<g>
        <text x="${labelW-5}" y="${y+BAR/2+1}" text-anchor="end" dominant-baseline="central" fill="${C.tx}" font-size="11" font-family="system-ui">${short}</text>
        <rect x="${labelW}" y="${y}" width="${bw}" height="${BAR}" fill="${color}" rx="1" opacity="${0.9-i*0.04}"/>
        <text x="${labelW+bw+6}" y="${y+BAR/2+1}" dominant-baseline="central" fill="${C.tx3}" font-size="10" font-family="system-ui">${val}${pct}</text>
      </g>`;
    }).join('');
    return `<div style="background:${C.bg2};border:1px solid ${C.bd};padding:1rem;margin-bottom:.75rem;border-left:2px solid ${color}">
      <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:${C.tx3};margin-bottom:${subtitle?'2px':'10px'}">${title}</div>
      ${subtitle?`<div style="font-size:11px;color:${C.tx3};margin-bottom:10px">${subtitle}</div>`:''}
      <svg width="100%" viewBox="0 0 ${W} ${h}">
        ${bars}
      </svg>
    </div>`;
  }

  // - helper: stacked hBar -
  function stackedBar(data, title, subtitle='') {
    if (!data.length) return '';
    const W=560, BAR=20, GAP=5, labelW=140, maxBW=320;
    const max = Math.max(...data.map(([,v])=>v.h+v.n),1);
    const h = data.length*(BAR+GAP)+46;
    const bars = data.map(([lbl,{h:heard,n:nyet}],i) => {
      const total=heard+nyet;
      const hw=Math.round((heard/max)*maxBW), nw=Math.round((nyet/max)*maxBW);
      const y=i*(BAR+GAP);
      const short=lbl.length>19?lbl.slice(0,18)+'…':lbl;
      return `<g>
        <text x="${labelW-5}" y="${y+BAR/2+1}" text-anchor="end" dominant-baseline="central" fill="${C.tx}" font-size="11" font-family="system-ui">${short}</text>
        <rect x="${labelW}" y="${y}" width="${hw}" height="${BAR}" fill="${C.grn}" rx="0"/>
        <rect x="${labelW+hw}" y="${y}" width="${nw}" height="${BAR}" fill="${C.red3}" rx="0"/>
        <text x="${labelW+hw+nw+6}" y="${y+BAR/2+1}" dominant-baseline="central" fill="${C.tx3}" font-size="10" font-family="system-ui">${heard}/${total}</text>
      </g>`;
    }).join('');
    const legend=`<g transform="translate(${labelW},${data.length*(BAR+GAP)+10})">
      <rect width="10" height="10" fill="${C.grn}"/><text x="14" y="9" fill="${C.tx3}" font-size="10" font-family="system-ui">Heard</text>
      <rect x="60" width="10" height="10" fill="${C.red3}"/><text x="74" y="9" fill="${C.tx3}" font-size="10" font-family="system-ui">Not yet</text>
    </g>`;
    return `<div style="background:${C.bg2};border:1px solid ${C.bd};padding:1rem;margin-bottom:.75rem;border-left:2px solid ${C.grn}">
      <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:${C.tx3};margin-bottom:${subtitle?'2px':'10px'}">${title}</div>
      ${subtitle?`<div style="font-size:11px;color:${C.tx3};margin-bottom:10px">${subtitle}</div>`:''}
      <svg width="100%" viewBox="0 0 ${W} ${h}">${bars}${legend}</svg>
    </div>`;
  }

  // - helper: donut -
  function donut(vals, lbls, colors, title, centerVal, centerLbl) {
    const total=vals.reduce((a,b)=>a+b,0); if(!total) return '';
    const cx=100,cy=100,ro=76,ri=46; let ang=-Math.PI/2;
    const slices=vals.map((v,i)=>{
      const sw=(v/total)*Math.PI*2;
      const x1=cx+ro*Math.cos(ang),y1=cy+ro*Math.sin(ang);
      ang+=sw;
      const x2=cx+ro*Math.cos(ang),y2=cy+ro*Math.sin(ang);
      const xi1=cx+ri*Math.cos(ang-sw),yi1=cy+ri*Math.sin(ang-sw);
      const xi2=cx+ri*Math.cos(ang),yi2=cy+ri*Math.sin(ang);
      const lg=sw>Math.PI?1:0;
      return `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${ro} ${ro} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${xi2.toFixed(1)} ${yi2.toFixed(1)} A${ri} ${ri} 0 ${lg} 0 ${xi1.toFixed(1)} ${yi1.toFixed(1)} Z" fill="${colors[i%colors.length]}"/>`;
    }).join('');
    const legRows=Math.ceil(lbls.length/2);
    const legH=legRows*18, svgH=208+legH;
    const leg=lbls.map((l,i)=>{
      const col=i%2===0?220:350, row=Math.floor(i/2);
      const short=l.length>14?l.slice(0,13)+'…':l;
      return `<g transform="translate(${col},${204+row*18})"><rect width="9" height="9" y="1" fill="${colors[i%colors.length]}"/><text x="13" y="9" fill="${C.tx}" font-size="10" font-family="system-ui">${short} (${vals[i]})</text></g>`;
    }).join('');
    return `<div style="background:${C.bg2};border:1px solid ${C.bd};padding:1rem;margin-bottom:.75rem;border-left:2px solid ${colors[0]}">
      <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:${C.tx3};margin-bottom:10px">${title}</div>
      <svg width="100%" viewBox="0 0 560 ${svgH}">
        ${slices}
        <circle cx="${cx}" cy="${cy}" r="${ri-3}" fill="${C.bg3}"/>
        <text x="${cx}" y="${cy-7}" text-anchor="middle" fill="${C.tx}" font-size="22" font-weight="600" font-family="system-ui">${centerVal}</text>
        <text x="${cx}" y="${cy+13}" text-anchor="middle" fill="${C.tx3}" font-size="10" font-family="system-ui">${centerLbl}</text>
        ${leg}
      </svg>
    </div>`;
  }

  const PALETTE=[C.red,C.grn,C.pur,C.amb,C.blu,'#e87a9b','#6bbf8e','#de7a4a','#8e9bde','#c8de4a','#4ac8de','#de4ac8'];

  $('SS').innerHTML = `
    <div class="sg">
      <div class="sc"><div class="sl">Artists tracked</div><div class="sv">${uArtists}</div></div>
      <div class="sc"><div class="sl">Completed</div><div class="sv">${Math.round(completed/Math.max(n,1)*100)}%</div></div>
      <div class="sc"><div class="sl">1001 heard</div><div class="sv">${h1001}/${D.k1001.length}</div></div>
      <div class="sc"><div class="sl">Discog ranked</div><div class="sv">${ranked}</div></div>
    </div>
    <div class="sg">
      <div class="sc"><div class="sl">Total LPs</div><div class="sv">${totalLPs}</div></div>
      <div class="sc"><div class="sl">Total EPs</div><div class="sv">${totalEPs}</div></div>
      <div class="sc"><div class="sl">Reruns</div><div class="sv">${rerunned}</div></div>
      <div class="sc"><div class="sl">Fav albums</div><div class="sv">${D.favs.length}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
      <div>
        ${vBar(yrKeys.map(y=>[y,byYear[y]]), 'Discog runs per year', C.red)}
        ${hBar(genres, 'Genre breakdown', C.red, true, n)}
      </div>
      <div>
        ${donut([completed,n-completed],['Completed','Incomplete'],[C.red,C.bd],'Completion rate',Math.round(completed/Math.max(n,1)*100)+'%','of runs')}
        ${vBar(yrKeys.filter(y=>lpsByYear[y]).map(y=>[y,lpsByYear[y]||0]), 'LPs listened per year', C.pur)}
        ${stackedBar(topK, '1001 albums by genre', 'Heard vs not yet')}
        ${stackedBar(topDec, '1001 albums by decade', 'Heard vs not yet')}
      </div>
    </div>
  `;
}


// - Init -
RR();
</script>
